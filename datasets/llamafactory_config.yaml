### LLaMA-Factory Configuration for FurEverSafe Chatbot
### For training on mid-end laptops with GPU

### Model Configuration
model_name_or_path: mistralai/Mistral-7B-Instruct-v0.1
template: mistral  # Template format for the model
cutoff_len: 1024   # Maximum sequence length
overwrite_cache: true

### Data Configuration
data_path: fureversafe_chatbot_training.jsonl
val_set_size: 0.1  # Use 10% for validation
split: train  # Use training split

### Training Configuration
output_dir: ./fureversafe-mistral-tuned
overwrite_output_dir: true

# Batch size - IMPORTANT for mid-end hardware
per_device_train_batch_size: 4   # Reduce to 2 if OOM errors
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4   # Effective batch = 4 * 4 = 16

# Learning rate schedule
lr_scheduler_type: cosine
learning_rate: 5.0e-5  # Lower LR for stability
warmup_ratio: 0.1
num_train_epochs: 3
max_steps: -1  # -1 means use num_train_epochs

# Logging and saving
logging_steps: 10  # Log every N steps
save_steps: 100    # Save every N steps
save_total_limit: 2  # Keep only 2 checkpoints
save_strategy: steps
eval_strategy: steps
eval_steps: 50

# Optimization - Mixed Precision Training
fp16: true          # Enable mixed precision for faster training
max_grad_norm: 1.0  # Gradient clipping

# Optimizer configuration
optim: adamw_torch  # Or adamw_bnb_8bit for lower memory
max_target_length: 1024

### Hardware Configuration
devices: [0]  # GPU device ID (0 for first GPU)
ddp_find_unused_parameters: false

### Additional settings
remove_unused_columns: true
report_to: none  # Set to "wandb" if you want to track metrics
dataloader_pin_memory: true
dataloader_num_workers: 4
