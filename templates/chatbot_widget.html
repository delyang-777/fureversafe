<!-- Chatbot Widget Component -->
<div id="chatbot-container" class="chatbot-container">
    <!-- Chatbot Toggle Button (Minimized) -->
    <div id="chatbot-toggle" class="chatbot-toggle" title="Chat with FurEverSafe Assistant">
        <i class="fas fa-comments"></i>
        <span class="chatbot-badge" id="chatbot-badge">1</span>
    </div>

    <!-- Chatbot Widget (Full) -->
    <div id="chatbot-widget" class="chatbot-widget" style="display: none;">
        <!-- Header -->
        <div class="chatbot-header">
            <div class="chatbot-header-content">
                <h3>FurEverSafe Assistant</h3>
                <p>Ask me about adoption, health, training, and more!</p>
            </div>
            <button id="chatbot-close" class="chatbot-close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Messages Container -->
        <div id="chatbot-messages" class="chatbot-messages">
            <div class="chatbot-message bot-message">
                <div class="message-content">
                    <p>Hi! I'm your FurEverSafe assistant. I can help you with:</p>
                    <ul style="margin: 10px 0; padding-left: 20px; text-align: left;">
                        <li>Dog adoption tips</li>
                        <li>Pet health advice</li>
                        <li>Training guidance</li>
                        <li>Lost dog assistance</li>
                        <li>Feature navigation</li>
                    </ul>
                    <p>What can I help you with today?</p>
                </div>
                <span class="message-time">Now</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chatbot-input-area">
            <input
                type="text"
                id="chatbot-input"
                class="chatbot-input"
                placeholder="Ask me anything..."
                autocomplete="off"
            >
            <button id="chatbot-send" class="chatbot-send-btn" title="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const chatbotToggle = document.getElementById('chatbot-toggle');
    const chatbotWidget = document.getElementById('chatbot-widget');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatbotInput = document.getElementById('chatbot-input');
    const chatbotSend = document.getElementById('chatbot-send');
    const chatbotMessages = document.getElementById('chatbot-messages');

    let isOpen = false;
    let isGenerating = false;

    chatbotToggle.addEventListener('click', () => {
        isOpen = !isOpen;
        chatbotWidget.style.display = isOpen ? 'flex' : 'none';
        chatbotToggle.style.display = isOpen ? 'none' : 'flex';
        if (isOpen) chatbotInput.focus();
    });

    chatbotClose.addEventListener('click', () => {
        isOpen = false;
        chatbotWidget.style.display = 'none';
        chatbotToggle.style.display = 'flex';
    });

    async function sendMessage() {
        const userMessage = chatbotInput.value.trim();
        if (!userMessage || isGenerating) return;

        isGenerating = true;
        chatbotSend.disabled = true;
        chatbotInput.disabled = true;

        // Add user message
        const userMessageEl = document.createElement('div');
        userMessageEl.className = 'chatbot-message user-message';
        userMessageEl.innerHTML = `
            <div class="message-content"><p>${escapeHtml(userMessage)}</p></div>
            <span class="message-time">Now</span>
        `;
        chatbotMessages.appendChild(userMessageEl);
        chatbotInput.value = '';
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;

        // Create bot response bubble (starts with thinking indicator)
        const botMessageEl = document.createElement('div');
        botMessageEl.className = 'chatbot-message bot-message';
        botMessageEl.innerHTML = `
            <div class="message-content">
                <div class="thinking-indicator">
                    <span class="thinking-text">FurEverSafe is thinking</span>
                    <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>
                </div>
            </div>
            <span class="message-time">Now</span>
        `;
        chatbotMessages.appendChild(botMessageEl);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;

        const contentEl = botMessageEl.querySelector('.message-content');
        let responseText = '';
        let firstToken = true;

        try {
            const response = await fetch('/api/chatbot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMessage })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;

                    const jsonStr = line.slice(6);
                    let data;
                    try {
                        data = JSON.parse(jsonStr);
                    } catch (e) {
                        continue;
                    }

                    if (data.thinking) {
                        // Already showing thinking indicator
                        continue;
                    }

                    if (data.token) {
                        if (firstToken) {
                            contentEl.innerHTML = '<p class="streaming-cursor"></p>';
                            firstToken = false;
                        }
                        responseText += data.token;
                        // Show clean text while streaming (strip markdown artifacts)
                        contentEl.querySelector('p').textContent = responseText.replace(/\*\*/g, '');
                        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
                    }

                    if (data.done) {
                        if (firstToken) {
                            contentEl.innerHTML = '<p>I\'m sorry, could you rephrase your question?</p>';
                        } else {
                            contentEl.innerHTML = formatBotMessage(responseText);
                        }
                    }
                }
            }
        } catch (error) {
            console.error('Error:', error);
            contentEl.innerHTML = '<p>Sorry, I encountered an error. Please try again.</p>';
        }

        // Final format pass in case done event was missed
        if (responseText && contentEl.querySelector('.streaming-cursor')) {
            contentEl.innerHTML = formatBotMessage(responseText);
        }

        isGenerating = false;
        chatbotSend.disabled = false;
        chatbotInput.disabled = false;
        chatbotInput.focus();
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    }

    chatbotSend.addEventListener('click', sendMessage);
    chatbotInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function formatBotMessage(text) {
        // Clean up raw text: remove all asterisks
        text = text.replace(/\*\*/g, '').replace(/\*/g, '');

        // Normalize line breaks: split on " - " that acts as list items
        // Pattern: " - Item text" used inline by the model
        // Also split on numbered patterns like "1." "2." "Step 1:" etc.
        text = text.replace(/\s+-\s+/g, '\n- ');
        text = text.replace(/(\d+[\.\)]\s)/g, '\n$1');
        text = text.replace(/(Step\s+\d+[:\s])/gi, '\n$1');

        let html = escapeHtml(text);

        const lines = html.split('\n');
        const result = [];
        let inList = false;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            const bulletMatch = line.match(/^[-•]\s*(.*)/);
            const numberedMatch = line.match(/^(\d+[\.\)]\s*)(.*)/);
            const stepMatch = line.match(/^(Step\s+\d+[:\s]*)(.*)/i);

            if (bulletMatch || numberedMatch || stepMatch) {
                if (!inList) { result.push('<ul>'); inList = true; }
                let content;
                if (bulletMatch) {
                    content = bulletMatch[1];
                } else if (stepMatch) {
                    content = '<strong>' + stepMatch[1].trim() + '</strong> ' + stepMatch[2];
                } else {
                    content = '<strong>' + numberedMatch[1].trim() + '</strong> ' + numberedMatch[2];
                }
                result.push('<li>' + content + '</li>');
            } else {
                if (inList) { result.push('</ul>'); inList = false; }
                result.push('<p>' + line + '</p>');
            }
        }
        if (inList) result.push('</ul>');

        return result.join('');
    }
</script>
