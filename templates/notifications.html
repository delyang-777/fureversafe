{% extends "base.html" %}

{% block title %}Notifications - FurEverSafe{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="fas fa-bell"></i> Notifications</h4>
                    <button class="btn btn-sm btn-light" onclick="markAllRead()">
                        <i class="fas fa-check-double"></i> Mark all as read
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="allNotificationsList">
                        <div class="text-center p-5">
                            <div class="spinner-border text-primary"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let loading = false;

function loadAllNotifications(page = 1) {
    if (loading) return;
    loading = true;
    
    $.ajax({
        url: '/api/notifications',
        method: 'GET',
        data: { page: page, per_page: 20 },
        success: function(data) {
            displayAllNotifications(data.notifications);
            
            if (data.pages > page) {
                currentPage = page;
                // Add load more button
                if ($('#loadMoreBtn').length === 0) {
                    $('#allNotificationsList').append(`
                        <div class="text-center p-3" id="loadMoreBtn">
                            <button class="btn btn-outline-primary" onclick="loadAllNotifications(${page + 1})">
                                Load More
                            </button>
                        </div>
                    `);
                }
            } else {
                $('#loadMoreBtn').remove();
            }
            
            loading = false;
        }
    });
}

function displayAllNotifications(notifications) {
    const container = $('#allNotificationsList');
    
    if (notifications.length === 0 && currentPage === 1) {
        container.html(`
            <div class="text-center p-5">
                <i class="fas fa-bell-slash fa-3x text-muted mb-3"></i>
                <h5>No notifications</h5>
                <p class="text-muted">You're all caught up!</p>
            </div>
        `);
        return;
    }
    
    if (currentPage === 1) {
        container.empty();
    }
    
    notifications.forEach(notification => {
        let icon = getNotificationIcon(notification.type);
        let bgColor = getNotificationColor(notification.type);
        
        container.append(`
            <div class="notification-item p-3 border-bottom ${!notification.is_read ? 'bg-light' : ''}" data-id="${notification.id}">
                <div class="d-flex">
                    <div class="flex-shrink-0">
                        <i class="${icon} fs-4" style="color: ${bgColor}"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <strong>${escapeHtml(notification.title)}</strong>
                            <small class="text-muted">${timeAgo(notification.created_at)}</small>
                        </div>
                        <p class="mb-1">${escapeHtml(notification.message)}</p>
                        ${!notification.is_read ? '<span class="badge bg-primary">New</span>' : ''}
                    </div>
                </div>
            </div>
        `);
    });
}

// Load notifications on page load
$(document).ready(function() {
    loadAllNotifications();
});
</script>
{% endblock %}
